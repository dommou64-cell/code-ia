<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - Découvrir Bruxelles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Découvrir Bruxelles 2</h1>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contact</h2>
            <form id="contact-form">
                <label for="nom">Nom:</label>
                <input type="text" id="nom" name="nom" required>

                <label for="courriel">Courriel:</label>
                <input type="email" id="courriel" name="courriel" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" maxlength="800" required></textarea>

                <button type="submit" style="display: block; margin: 0 auto;">Soumettre</button>
            </form>
        </section>
    </main>

    <footer> 
        <p style="text-align: center;">© 2026 Découvrir Bruxelles</p> 
    </footer>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            if (confirm('Message envoyé ! Voulez-vous retourner à l\'accueil ?')) {
                window.location.href = 'index.html';
            }
        });
    </script>

</body>
</html>
