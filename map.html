<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte - Découvrir Bruxelles</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        #map {
            height: 600px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Découvrir Bruxelles 2</h1>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="map.html">Carte</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Carte - Place de la Monnaie</h2>
            <div id="map"></div>
        </section>
    </main>

    <footer> 
        <p style="text-align: center;">© 2026 Découvrir Bruxelles</p> 
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script>
        // Initialiser la carte centrée sur la Place de la Monnaie à Bruxelles
        const map = L.map('map').setView([50.8468, 4.3642], 15);

        // Ajouter le layer OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // Coordonnées de la Grand Place de Bruxelles
        const grandPlaceLat = 50.8457;
        const grandPlaceLong = 4.3488;

        // Ajouter un marqueur à la Place de la Monnaie
        L.marker([50.8468, 4.3642]).addTo(map)
            .bindPopup('<b>La Monnaie</b><br>Bruxelles');

        // Récupérer les fontaines d'eau potable via l'API OpenData
        const apiUrl = `https://bruxellesdata.opendatasoft.com/api/explore/v2.1/catalog/datasets/fontaines-d-eau-potable-gerees-par-la-ville-de-bruxelles/records?where=within_distance(geo_point_2d, geom'POINT(${grandPlaceLong} ${grandPlaceLat})', 1km)&limit=20`;

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                // Ajouter des marqueurs pour chaque fontaine
                data.results.forEach(fontaine => {
                    const lat = fontaine.geo_point_2d.lat;
                    const lon = fontaine.geo_point_2d.lon;
                    const adresse = fontaine.adresse || 'Fontaine d\'eau potable';

                    L.marker([lat, lon], {
                        icon: L.icon({
                            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
                            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                            iconSize: [25, 41],
                            iconAnchor: [12, 41],
                            popupAnchor: [1, -34],
                            shadowSize: [41, 41]
                        })
                    }).addTo(map)
                        .bindPopup(`<b>Fontaine d'eau potable</b><br>${adresse}`);
                });
            })
            .catch(error => console.error('Erreur lors du chargement des fontaines:', error));
    </script>

</body>
</html>
